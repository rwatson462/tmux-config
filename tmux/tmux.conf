# Terminal Workspace - tmux configuration
# ========================================

# Prefix key: Ctrl+Space
unbind C-b
set -g prefix C-Space
bind C-Space send-prefix

# General settings
set -g mouse on
set -g detach-on-destroy off  # Switch to another session when current one is destroyed
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on
set -g history-limit 10000
set -sg escape-time 0

# Pane navigation (h/l for sidebar/main)
bind h select-pane -L
bind l select-pane -R

# Window (tab) management
bind c new-window -c "#{pane_current_path}"
bind x confirm-before -p "Close window? (y/n)" kill-window
bind n next-window
bind p previous-window
bind 1 select-window -t 1
bind 2 select-window -t 2
bind 3 select-window -t 3
bind 4 select-window -t 4
bind 5 select-window -t 5
bind 6 select-window -t 6
bind 7 select-window -t 7
bind 8 select-window -t 8
bind 9 select-window -t 9

# Status bar styling
set -g status-position bottom
set -g status-style "bg=#1e1e2e,fg=#cdd6f4"
set -g status-left-length 30
set -g status-right-length 50

set -g status-left "#[fg=#89b4fa,bold] #S #[fg=#6c7086]│ "
set -g status-right "#[fg=#6c7086]│ #[fg=#a6e3a1]%H:%M "

# Window status
setw -g window-status-format "#[fg=#6c7086] #I:#W "
setw -g window-status-current-format "#[fg=#f5c2e7,bold] #I:#W "
setw -g window-status-separator ""

# Pane borders
set -g pane-border-style "fg=#313244"
set -g pane-active-border-style "fg=#89b4fa"
set -g pane-border-indicators off

# Message styling
set -g message-style "bg=#313244,fg=#cdd6f4"
set -g message-command-style "bg=#313244,fg=#cdd6f4"

# Selection colors
setw -g mode-style "bg=#45475a,fg=#cdd6f4"

# Project selector popup (Ctrl+p without prefix)
bind-key -n C-p display-popup -E -w 60% -h 50% "/Volumes/T9/Developer/vibes/terminal-view/bin/project-selector"
